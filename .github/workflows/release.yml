name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - name: Run flake checks
        run: nix flake check --keep-going
      - name: Build static package
        run: nix build .#monlin-static -L --out-link result-static
      - name: Package release artifacts
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh "${GITHUB_REF_NAME#v}" x86_64-unknown-linux-musl result-static/bin/monlin
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
          fi
